<style>
  :root {
    --bg: #ffffff;
    --ink: #1a1a1a;
    --muted: #999999;
    --border: #ececec;
    --border-soft: #f5f5f5;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.5px;
  }
  .header p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 14px;
  }
  .today-btn {
    border: 1px solid var(--border);
    background: #fafafa;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #333;
  }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .nav-btn {
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 10px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #333;
    font-size: 18px;
    line-height: 1;
  }
  .month-title {
    font-size: 19px;
    font-weight: 700;
    text-transform: capitalize;
  }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }
  .weekdays div {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    padding: 4px 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day {
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: transform 0.08s ease;
  }
  .day:active { transform: scale(0.94); }
  .day.today { border: 2px solid var(--ink); }
  .day.empty { visibility: hidden; pointer-events: none; }

  .legend-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin: 28px 0 10px;
  }
  .legend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.1s ease;
  }
  .legend-item:hover {
    background: var(--border-soft);
  }
  .swatch {
    width: 16px;
    height: 16px;
    border-radius: 5px;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .legend-row {
    display: flex;
    justify-content: space-between;
    flex: 1;
  }
  .legend-count {
    color: #aaa;
    font-weight: 600;
  }

  .totals-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .totals-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }
  .totals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .total-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: var(--border-soft);
  }
  .total-card .swatch {
    width: 18px;
    height: 18px;
  }
  .total-info {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }
  .total-label {
    font-size: 12px;
    color: #777;
  }
  .total-count {
    font-size: 17px;
    font-weight: 800;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 20px 18px 28px;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  }
  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .sheet-header div {
    font-weight: 700;
    font-size: 16px;
    text-transform: capitalize;
  }
  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #999;
    font-size: 22px;
    line-height: 1;
    padding: 0;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .cat-btn {
    border: none;
    border-radius: 10px;
    padding: 12px 10px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
  }
  .clear-btn {
    margin-top: 10px;
    width: 100%;
    background: #f5f5f5;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 13.5px;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    display: none;
  }
  .clear-btn.show { display: block; }

  /* Selector de color de categoría */
  .color-sheet {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 20px 18px 24px;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  }
  .color-sheet-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .color-sheet-header .cur-swatch {
    width: 24px;
    height: 24px;
    border-radius: 7px;
    border: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
  }
  .color-sheet-header .label {
    font-weight: 700;
    font-size: 15px;
    flex: 1;
  }
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .palette-swatch {
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    position: relative;
  }
  .palette-swatch.selected::after {
    content: "✓";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.95);
    font-size: 14px;
    font-weight: 800;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
  }
  .custom-color-row {
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .custom-color-row label {
    font-size: 13px;
    color: #666;
    flex: 1;
  }
  .custom-color-row input[type="color"] {
    width: 42px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
    cursor: pointer;
    background: none;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div>
      <h1>Mis turnos</h1>
      <p>Toca un día para asignarle una categoría</p>
    </div>
    <button class="today-btn" id="todayBtn">Hoy</button>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prevBtn" aria-label="Mes anterior">‹</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="nav-btn" id="nextBtn" aria-label="Mes siguiente">›</button>
  </div>

  <div class="weekdays">
    <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
  </div>

  <div class="grid" id="calendarGrid"></div>

  <div class="legend-title">Categorías</div>
  <div class="legend-grid" id="legendGrid"></div>

  <div class="totals-section">
    <div class="totals-title">Total acumulado (desde siempre)</div>
    <div class="totals-grid" id="totalsGrid"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-header">
      <div id="sheetDate"></div>
      <button class="close-btn" id="closeBtn">&times;</button>
    </div>
    <div class="cat-grid" id="catGrid"></div>
    <button class="clear-btn" id="clearBtn">Quitar marca</button>
  </div>
</div>

<div class="overlay" id="colorOverlay">
  <div class="color-sheet">
    <div class="color-sheet-header">
      <span class="cur-swatch" id="colorCurSwatch"></span>
      <span class="label" id="colorCurLabel"></span>
      <button class="close-btn" id="colorCloseBtn">&times;</button>
    </div>
    <div class="palette-grid" id="paletteGrid"></div>
    <div class="custom-color-row">
      <label for="customColorInput">O elige un color exacto</label>
      <input type="color" id="customColorInput">
    </div>
  </div>
</div>

<script>
  const CATEGORIES = [
    { id: "manana",        label: "Turno de mañana",   color: "#FFC107", text: "#1A1A1A" },
    { id: "tarde",         label: "Turno de tarde",    color: "#FF6B35", text: "#FFFFFF" },
    { id: "libre",         label: "Día libre",         color: "#4CAF50", text: "#FFFFFF" },
    { id: "finde",         label: "Fin de semana",     color: "#3F51B5", text: "#FFFFFF" },
    { id: "vacaciones",    label: "Vacaciones",        color: "#00BCD4", text: "#1A1A1A" },
    { id: "compensaciones",label: "Compensaciones",    color: "#9C27B0", text: "#FFFFFF" },
    { id: "asuntos",       label: "Asuntos particulares", color: "#E91E63", text: "#FFFFFF" },
    { id: "permisos",      label: "Permisos",          color: "#795548", text: "#FFFFFF" },
    { id: "bajas",         label: "Bajas",             color: "#212121", text: "#FFFFFF" },
  ];

  const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const DIAS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  const STORAGE_KEY = "turnos-app-marks";
  const COLORS_KEY = "turnos-app-colors";

  // Paleta amplia y muy variada para personalizar cada categoría
  const PALETTE = [
    "#F44336","#E91E63","#D81B60","#C2185B","#9C27B0","#7B1FA2",
    "#673AB7","#5E35B1","#3F51B5","#3949AB","#2196F3","#1976D2",
    "#03A9F4","#0288D1","#00BCD4","#0097A7","#009688","#00796B",
    "#4CAF50","#388E3C","#8BC34A","#689F38","#CDDC39","#AFB42B",
    "#FFEB3B","#FBC02D","#FFC107","#FFA000","#FF9800","#F57C00",
    "#FF6B35","#FF5722","#E64A19","#795548","#5D4037","#607D8B",
    "#455A64","#212121","#37474F","#9E9E9E",
  ];

  function loadMarks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }
  function saveMarks(marks) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(marks)); } catch (e) {}
  }

  function loadCustomColors() {
    try {
      const raw = localStorage.getItem(COLORS_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }
  function saveCustomColors(colors) {
    try { localStorage.setItem(COLORS_KEY, JSON.stringify(colors)); } catch (e) {}
  }

  function getContrastText(hex) {
    const c = hex.replace("#", "");
    const r = parseInt(c.substring(0, 2), 16);
    const g = parseInt(c.substring(2, 4), 16);
    const b = parseInt(c.substring(4, 6), 16);
    const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return luminance > 0.6 ? "#1A1A1A" : "#FFFFFF";
  }

  let customColors = loadCustomColors();

  function getColor(catId) {
    return customColors[catId] || getCatById(catId).color;
  }
  function getTextColor(catId) {
    return getContrastText(getColor(catId));
  }

  let marks = loadMarks();
  const now = new Date();
  let current = { year: now.getFullYear(), month: now.getMonth() };
  let selectedDay = null;

  function getCatById(id) { return CATEGORIES.find(c => c.id === id); }
  function dateKey(year, month, day) {
    return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
  }
  function todayKey() {
    const t = new Date();
    return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
  }

  function renderLegend() {
    const counts = {};
    CATEGORIES.forEach(c => counts[c.id] = 0);
    Object.keys(marks).forEach(key => {
      const [y, m] = key.split("-").map(Number);
      if (y === current.year && (m - 1) === current.month) {
        counts[marks[key]] = (counts[marks[key]] || 0) + 1;
      }
    });

    const legendGrid = document.getElementById("legendGrid");
    legendGrid.innerHTML = "";
    CATEGORIES.forEach(c => {
      const item = document.createElement("div");
      item.className = "legend-item";
      item.title = "Toca para cambiar el color";
      item.innerHTML = `
        <span class="swatch" style="background:${getColor(c.id)}"></span>
        <span class="legend-row">
          <span>${c.label}</span>
          <span class="legend-count">${counts[c.id] || 0}</span>
        </span>
      `;
      item.addEventListener("click", () => openColorPicker(c.id));
      legendGrid.appendChild(item);
    });
  }

  function renderTotals() {
    const counts = {};
    CATEGORIES.forEach(c => counts[c.id] = 0);
    Object.values(marks).forEach(catId => {
      if (counts[catId] !== undefined) counts[catId] += 1;
    });

    const totalsGrid = document.getElementById("totalsGrid");
    totalsGrid.innerHTML = "";
    CATEGORIES.forEach(c => {
      const card = document.createElement("div");
      card.className = "total-card";
      card.innerHTML = `
        <span class="swatch" style="background:${getColor(c.id)}"></span>
        <span class="total-info">
          <span class="total-label">${c.label}</span>
          <span class="total-count">${counts[c.id] || 0}</span>
        </span>
      `;
      totalsGrid.appendChild(card);
    });
  }

  function renderCalendar() {
    document.getElementById("monthTitle").textContent = `${MESES[current.month]} ${current.year}`;

    const firstOfMonth = new Date(current.year, current.month, 1);
    const jsDay = firstOfMonth.getDay();
    const leadingBlanks = (jsDay + 6) % 7;
    const daysInMonth = new Date(current.year, current.month + 1, 0).getDate();

    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    for (let i = 0; i < leadingBlanks; i++) {
      const empty = document.createElement("div");
      empty.className = "day empty";
      grid.appendChild(empty);
    }

    const tKey = todayKey();

    for (let d = 1; d <= daysInMonth; d++) {
      const key = dateKey(current.year, current.month, d);
      const cat = marks[key] ? getCatById(marks[key]) : null;
      const btn = document.createElement("button");
      btn.className = "day" + (key === tKey ? " today" : "");
      btn.textContent = d;
      if (cat) {
        const col = getColor(cat.id);
        btn.style.background = col;
        btn.style.color = getTextColor(cat.id);
        btn.style.borderColor = col;
      }
      btn.addEventListener("click", () => openDay(d));
      grid.appendChild(btn);
    }

    const totalCells = leadingBlanks + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for (let i = 0; i < trailing; i++) {
      const empty = document.createElement("div");
      empty.className = "day empty";
      grid.appendChild(empty);
    }

    renderLegend();
    renderTotals();
  }

  function openDay(day) {
    selectedDay = dateKey(current.year, current.month, day);
    const dateObj = new Date(current.year, current.month, day);
    document.getElementById("sheetDate").textContent =
      `${day} de ${MESES[current.month]}`;

    const catGrid = document.getElementById("catGrid");
    catGrid.innerHTML = "";
    CATEGORIES.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.style.background = getColor(c.id);
      btn.style.color = getTextColor(c.id);
      btn.textContent = c.label;
      btn.addEventListener("click", () => applyCategory(c.id));
      catGrid.appendChild(btn);
    });

    const clearBtn = document.getElementById("clearBtn");
    clearBtn.classList.toggle("show", !!marks[selectedDay]);

    document.getElementById("overlay").classList.add("open");
  }

  function closeSheet() {
    document.getElementById("overlay").classList.remove("open");
    selectedDay = null;
  }

  function applyCategory(catId) {
    if (!selectedDay) return;
    marks[selectedDay] = catId;
    saveMarks(marks);
    closeSheet();
    renderCalendar();
  }

  function clearDay() {
    if (!selectedDay) return;
    delete marks[selectedDay];
    saveMarks(marks);
    closeSheet();
    renderCalendar();
  }

  let pickerCatId = null;

  function openColorPicker(catId) {
    pickerCatId = catId;
    const cat = getCatById(catId);
    const curColor = getColor(catId);

    document.getElementById("colorCurSwatch").style.background = curColor;
    document.getElementById("colorCurLabel").textContent = cat.label;
    document.getElementById("customColorInput").value = curColor;

    const grid = document.getElementById("paletteGrid");
    grid.innerHTML = "";
    PALETTE.forEach(hex => {
      const sw = document.createElement("button");
      sw.className = "palette-swatch" + (hex.toLowerCase() === curColor.toLowerCase() ? " selected" : "");
      sw.style.background = hex;
      sw.addEventListener("click", () => chooseColor(hex));
      grid.appendChild(sw);
    });

    document.getElementById("colorOverlay").classList.add("open");
  }

  function closeColorPicker() {
    document.getElementById("colorOverlay").classList.remove("open");
    pickerCatId = null;
  }

  function chooseColor(hex) {
    if (!pickerCatId) return;
    customColors[pickerCatId] = hex;
    saveCustomColors(customColors);
    closeColorPicker();
    renderCalendar();
  }

  document.getElementById("colorCloseBtn").addEventListener("click", closeColorPicker);
  document.getElementById("colorOverlay").addEventListener("click", (e) => {
    if (e.target.id === "colorOverlay") closeColorPicker();
  });
  document.getElementById("customColorInput").addEventListener("input", (e) => {
    chooseColor(e.target.value);
  });

  document.getElementById("prevBtn").addEventListener("click", () => {
    current.month -= 1;
    if (current.month < 0) { current.month = 11; current.year -= 1; }
    renderCalendar();
  });
  document.getElementById("nextBtn").addEventListener("click", () => {
    current.month += 1;
    if (current.month > 11) { current.month = 0; current.year += 1; }
    renderCalendar();
  });
  document.getElementById("todayBtn").addEventListener("click", () => {
    const t = new Date();
    current = { year: t.getFullYear(), month: t.getMonth() };
    renderCalendar();
  });
  document.getElementById("closeBtn").addEventListener("click", closeSheet);
  document.getElementById("clearBtn").addEventListener("click", clearDay);
  document.getElementById("overlay").addEventListener("click", (e) => {
    if (e.target.id === "overlay") closeSheet();
  });

  renderCalendar();
</script>

</body>
</html>
